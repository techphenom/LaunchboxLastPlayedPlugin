name: Build Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore and Build
        run: dotnet build --configuration Release

      - name: Zip Plugin
        run: |
          Compress-Archive -Path "LaunchboxLastPlayedPlugin/bin/Release/net9.0/*" -DestinationPath "LaunchboxLastPlayedPlugin.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LaunchboxLastPlayedPlugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
